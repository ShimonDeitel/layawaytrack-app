name: Layawaytrack
options:
  bundleIdPrefix: com.shimondeitel.layawaytrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Layawaytrack:
    type: application
    platform: iOS
    sources:
      - path: Layawaytrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaytrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Layawaytrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LayawaytrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LayawaytrackTests
    dependencies:
      - target: Layawaytrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaytrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LayawaytrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LayawaytrackUITests
    dependencies:
      - target: Layawaytrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaytrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Layawaytrack:
    build:
      targets:
        Layawaytrack: all
        LayawaytrackTests: [test]
        LayawaytrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Layawaytrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Layawaytrack.storekit
      targets:
        - LayawaytrackTests
        - LayawaytrackUITests
    archive:
      config: Release
